version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gsite
      POSTGRES_PASSWORD: gsite_secret
      POSTGRES_DB: gsite_tournament
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsite -d gsite_tournament"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8002:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://gsite:gsite_secret@db:5432/gsite_tournament
      DATABASE_URL_SYNC: postgresql://gsite:gsite_secret@db:5432/gsite_tournament
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5175:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8002
      VITE_WS_URL: ws://localhost:8002
    depends_on:
      - backend

volumes:
  pgdata:
